<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L LAB Tracker v7.2</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f6f7fb;margin:0}
.wrap{max-width:720px;margin:auto;padding:16px}
.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:0 8px 20px rgba(0,0,0,.05)}
h2{margin:0 0 12px}
input,select{width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin-bottom:8px}
button{width:100%;padding:12px;border:none;border-radius:14px;background:#111827;color:#fff;font-weight:bold}
.small{font-size:13px;color:#666;margin-top:6px}
.ok{color:#16a34a}
.warn{color:#b91c1c}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h2>每日熱量檢查（v7.2 範圍邏輯）</h2>

<label>日期</label>
<input type="date" id="date">

<label>運動種類</label>
<select id="training">
<option value="休息">休息</option>
<option value="Zone2">Zone2</option>
<option value="重訓">重訓</option>
<option value="HYROX">HYROX</option>
</select>

<label><input type="checkbox" id="recovery"> 今天是恢復日</label>

<label>總熱量 (kcal)</label>
<input type="number" id="kcal">

<button onclick="checkKcal()">檢查是否在範圍</button>

<div id="result" class="small"></div>

</div>
</div>

<script>
function getRange(training, recovery){
    if(recovery) return [1700,1800]
    switch(training){
        case "重訓": return [1650,1750]
        case "HYROX": return [1700,1850]
        case "Zone2": return [1450,1550]
        case "休息": return [1350,1450]
        default: return [0,9999]
    }
}

function checkKcal(){
    const t = document.getElementById("training").value
    const r = document.getElementById("recovery").checked
    const kcal = Number(document.getElementById("kcal").value)
    const range = getRange(t,r)
    const el = document.getElementById("result")
    if(kcal >= range[0] && kcal <= range[1]){
        el.innerHTML = "✅ 在範圍內 ("+range[0]+"-"+range[1]+")"
        el.className="small ok"
    }else{
        el.innerHTML = "⚠️ 不在範圍內，目標 "+range[0]+"-"+range[1]
        el.className="small warn"
    }
}
document.getElementById("date").value = new Date().toISOString().slice(0,10)
</script>

</body>
</html>
